<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - SoPrimico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/Logo.png">
    <style>
        .profile-container {
            max-width: 500px;
            margin: 100px auto;
            background: rgba(0,0,0,0.85);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
        }
        .profile-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #fff;
        }
        .profile-info {
            background: #1a1a2e;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }
        .profile-info p {
            margin: 10px 0;
            color: #ccc;
        }
        .profile-info span {
            color: #6b4bb5;
            font-weight: bold;
        }
        .profile-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #333;
        }
        .profile-section h3 {
            color: #fff;
            margin-bottom: 15px;
        }
        .profile-container input {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: none;
            background: #1a1a2e;
            color: white;
        }
        .profile-container button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            background: #4a2f8d;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
        }
        .profile-container button:hover {
            background: #6b4bb5;
        }
        .btn-danger {
            background: #8d2f2f;
        }
        .btn-danger:hover {
            background: #b54b4b;
        }
        .btn-logout {
            background: #333;
            margin-top: 20px;
        }
        .btn-logout:hover {
            background: #555;
        }
        .message {
            margin: 10px 0;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
        }
        .success {
            background: #1e5a1e;
            color: #aaffaa;
        }
        .error {
            background: #5a1e1e;
            color: #ffaaaa;
        }
        .back-btn {
            background: transparent;
            border: 1px solid #6b4bb5;
            margin-bottom: 20px;
        }
        .back-btn:hover {
            background: #6b4bb5;
        }
    </style>
</head>
<body>
    <header class="Barra-Menu">
        <h1>SoPrimico</h1>
        <nav class="Botones">
            <button onclick="location.href='index.html'">Home</button>
            <button onclick="location.href='services.html'">Services</button>
            <button onclick="location.href='games.html'">Games</button>
            <button onclick="location.href='help.html'">Help</button>
            <button onclick="location.href='profile.html'">Mi Perfil</button>
            <button onclick="logout()">Cerrar Sesión</button>
        </nav>
    </header>

    <div class="profile-container">
        <button class="back-btn" onclick="location.href='index.html'">← Volver al inicio</button>
        
        <h2>👤 Mi Perfil</h2>
        
        <div class="profile-info" id="profileInfo">
            <p>📧 <span id="userEmail">Cargando...</span></p>
            <p>🆔 <span>Miembro de SoPrimico</span></p>
            <p>📅 <span>Usuario registrado</span></p>
        </div>

        <div class="profile-section">
            <h3>🔐 Cambiar Contraseña</h3>
            <input type="password" id="oldPassword" placeholder="Contraseña actual">
            <input type="password" id="newPassword" placeholder="Nueva contraseña (mínimo 4 caracteres)">
            <input type="password" id="confirmPassword" placeholder="Confirmar nueva contraseña">
            <button id="changePasswordBtn">Actualizar Contraseña</button>
        </div>

        <div class="profile-section">
            <h3>⚠️ Zona Peligrosa</h3>
            <button id="deleteAccountBtn" class="btn-danger">Eliminar mi cuenta</button>
        </div>

        <button onclick="logout()" class="btn-logout">🚪 Cerrar Sesión</button>
        
        <div id="messageDiv" class="message" style="display: none;"></div>
    </div>

    <script src="auth.js"></script>
    <script>
        protectPage();
        
        // Mostrar email del usuario
        const userEmail = getCurrentUser();
        if (userEmail) {
            document.getElementById('userEmail').innerText = userEmail;
        } else {
            window.location.href = 'login.html';
        }

        function showMessage(text, isSuccess = true) {
            const msgDiv = document.getElementById('messageDiv');
            msgDiv.innerText = text;
            msgDiv.className = `message ${isSuccess ? 'success' : 'error'}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        // Cambiar contraseña
        document.getElementById('changePasswordBtn').addEventListener('click', () => {
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (!oldPass || !newPass || !confirmPass) {
                showMessage('Completa todos los campos', false);
                return;
            }

            if (newPass !== confirmPass) {
                showMessage('Las nuevas contraseñas no coinciden', false);
                return;
            }

            const result = changePassword(userEmail, oldPass, newPass);
            if (result.success) {
                showMessage(result.message, true);
                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } else {
                showMessage(result.message, false);
            }
        });

        // Eliminar cuenta
        document.getElementById('deleteAccountBtn').addEventListener('click', () => {
            const confirmDelete = confirm('¿Estás SEGURO? Esta acción eliminará tu cuenta permanentemente. No se puede deshacer.');
            if (confirmDelete) {
                const password = prompt('Para confirmar, escribe tu contraseña:');
                if (password) {
                    const result = deleteAccount(userEmail, password);
                    if (result.success) {
                        alert('Cuenta eliminada. Serás redirigido al login.');
                        window.location.href = 'login.html';
                    } else {
                        showMessage(result.message, false);
                    }
                }
            }
        });
    </script>
</body>
</html>
