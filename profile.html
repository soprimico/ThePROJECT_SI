<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile - SoPrimico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="img/Logo.png">
    <style>
        
    </style>
</head>
<body>
    <header class="Barra-Menu">
        <h1>SoPrimico</h1>
        <nav class="Botones">
            <button onclick="location.href='index.html'">Home</button>
            <button onclick="location.href='services.html'">Services</button>
            <button onclick="location.href='games.html'">Games</button>
            <button onclick="location.href='help.html'">Help</button>
            <button onclick="location.href='profile.html'">Mi Perfil</button>
            <button onclick="logout()">Cerrar Sesión</button>
        </nav>
    </header>

    <div class="profile-container">
        
        <h2 style="font-size: 45px; margin-top: 40px;">My Profile</h2>
        
        <div class="profile-info" id="profileInfo" style="background-color: rgb(4, 4, 4); width: 100%; max-width: 300px; margin: 0 auto; box-shadow: white 0px 0px 10px; border-radius: 10px;">
            <p>User:<span id="userEmail">Cargando...</span></p>
            <p>Member:<span>SoPrimico</span></p>
            <p>Registered<span>User registered</span></p>
        </div>

        <div class="profile-section" style="margin-top: 15px;">
            <h3>Change password</h3>
            <input type="password" id="oldPassword" placeholder="password">
            <input type="password" id="newPassword" placeholder="new password (mínim 4 caracters)">
            <input type="password" id="confirmPassword" placeholder="Confirm new password">
            <button id="changePasswordBtn">Change password</button>
        </div>

        <div class="profile-section">
            <h3>Danger Zone</h3>
            <button id="deleteAccountBtn" class="btn-danger">Delete my account</button>
        </div>

        <button onclick="logout()" class="btn-logout">Log out</button>
        
        <div id="messageDiv" class="message" style="display: none;"></div>
    </div>

    <script src="auth.js"></script>
    <script>
        protectPage();
        
        // Mostrar email del usuario
        const userEmail = getCurrentUser();
        if (userEmail) {
            document.getElementById('userEmail').innerText = userEmail;
        } else {
            window.location.href = 'login.html';
        }

        function showMessage(text, isSuccess = true) {
            const msgDiv = document.getElementById('messageDiv');
            msgDiv.innerText = text;
            msgDiv.className = `message ${isSuccess ? 'success' : 'error'}`;
            msgDiv.style.display = 'block';
            setTimeout(() => {
                msgDiv.style.display = 'none';
            }, 3000);
        }

        // Cambiar contraseña
        document.getElementById('changePasswordBtn').addEventListener('click', () => {
            const oldPass = document.getElementById('oldPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;

            if (!oldPass || !newPass || !confirmPass) {
                showMessage('Complete all', false);
                return;
            }

            if (newPass !== confirmPass) {
                showMessage('Please put the same password in both inputs', false);
                return;
            }

            const result = changePassword(userEmail, oldPass, newPass);
            if (result.success) {
                showMessage(result.message, true);
                document.getElementById('oldPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
            } else {
                showMessage(result.message, false);
            }
        });

        // Eliminar cuenta
        document.getElementById('deleteAccountBtn').addEventListener('click', () => {
            const confirmDelete = confirm('Are you sure? You will delete your account.');
            if (confirmDelete) {
                const password = prompt('to confirm: Write your password.');
                if (password) {
                    const result = deleteAccount(userEmail, password);
                    if (result.success) {
                        alert('Account has been deleted. You will be redirected to login');
                        window.location.href = 'login.html';
                    } else {
                        showMessage(result.message, false);
                    }
                }
            }
        });
    </script>
</body>
</html>
