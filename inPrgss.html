<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoPrimico</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="imgs/S_Soprimico.png">
</head>
<body>
    <header>
        <div class="imglogo">
            <img src="imgs/SoPrimicoLOGO.png" alt="Logo" class="logo">
        </div>
        <div class="navebar">
            <button onclick="window.location.href='index.html'">Home</button>
            <button onclick="window.location.href='about.html'">About</button>
            <button onclick="window.location.href='services.html'">Services</button>
            <details>
                <summary>+</summary>
                <div class="contenidodetails">
                    <button onclick="window.location.href='#???'">???</button>
                    <button onclick="window.location.href='#???'">???</button>
                    <button onclick="window.location.href='#???'">???</button>
                </div>
            </details>
        </div>
    </header>

    <div class="Content1">
        <h1>In Progress...</h1>
    </div>

    <div id="SoPrimico" style="position: relative; top: -70px; visibility: hidden;"></div>
    <div id="whoweare" style="position: relative; top: -70px; visibility: hidden;"></div>
    <div id="learning" style="position: relative; top: -70px; visibility: hidden;"></div>

    <div class="secciones">
        <div class="seccion-card">
            <h2>SoPrimico</h2>
            <p>This is currently in progress!</p>
        </div>
        
    </div>

    <footer>
        <p>SoPrimico | happiness</p>
    </footer>

    <script>
        // Solamente para hacer scroll suave a las secciones
        const botones = document.querySelectorAll('.contenidodetails button');
        botones.forEach(boton => {
            boton.addEventListener('click', function(e) {
                const textoBoton = this.innerText;
                let seccionId = '';
                if(textoBoton === 'SoPrimico') seccionId = 'SoPrimico';
                if(textoBoton === 'Who we are?') seccionId = 'whoweare';
                if(textoBoton === 'Learning') seccionId = 'learning';
                
                if(seccionId) {
                    e.preventDefault();
                    const elemento = document.getElementById(seccionId);
                    if(elemento) {
                        elemento.scrollIntoView({ behavior: 'smooth', block: 'start' });
                    }
                }
            });
        });
    </script>
</body>
</html>
